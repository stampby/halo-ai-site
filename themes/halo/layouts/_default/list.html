{{ define "main" }}
<div class="container narrow content">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="section-sub">{{ . }}</p>{{ end }}
    {{ .Content }}
    {{ if .Pages }}
    <ul class="post-list">
        {{ range .Pages }}
        <li>
            <span class="date">{{ .Date.Format "Jan 2, 2006" }}</span>
            <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
            {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
        </li>
        {{ end }}
    </ul>
    {{ end }}
</div>
{{ end }}
