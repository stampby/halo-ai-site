<nav>
    <a href="/" class="logo">halo-<span>ai</span></a>
    <div class="links">
        {{ range .Site.Menus.main }}
        {{ if .Params.disabled }}
        <span class="nav-disabled" title="Coming soon">{{ .Name }}</span>
        {{ else }}
        <a href="{{ .URL }}"{{ if strings.HasPrefix .URL "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
        {{ end }}
        {{ end }}
    </div>
</nav>

<!-- Language wheel — right side, scroll, click to lock -->
<div class="lang-wheel" id="langWheel">
    {{ range .Site.Languages }}
    <a href="/{{ .Lang }}/" data-lang="{{ .Lang }}" class="{{ if eq $.Language.Lang .Lang }}lang-locked{{ end }}" onclick="lockLang('{{ .Lang }}', event)">{{ .LanguageName }}</a>
    {{ end }}
</div>
