<nav>
    <a href="/" class="logo">halo-<span>ai</span></a>
    <div class="links">
        {{ range .Site.Menus.main }}
        {{ if .Params.disabled }}
        <span class="nav-disabled" title="Coming soon">{{ .Name }}</span>
        {{ else }}
        <a href="{{ .URL }}"{{ if strings.HasPrefix .URL "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
        {{ end }}
        {{ end }}
        <div class="lang-dropdown">
            <span class="lang-trigger">{{ $.Language.LanguageName }}</span>
            <div class="lang-menu">
                {{ range .Site.Languages }}
                <a href="/{{ .Lang }}/" class="lang-option{{ if eq $.Language.Lang .Lang }} lang-active{{ end }}">{{ .LanguageName }}</a>
                {{ end }}
            </div>
        </div>
    </div>
</nav>
